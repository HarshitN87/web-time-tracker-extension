<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flow Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
        <defs>
          <linearGradient id="orbGradPop" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4A90E2"/>
            <stop offset="100%" stop-color="#7C3AED"/>
          </linearGradient>
          <linearGradient id="glossGradPop" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
          </linearGradient>
          <filter id="softShadowPop" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(74, 144, 226, 0.2)" />
          </filter>
        </defs>
        <circle cx="50" cy="50" r="46" fill="url(#orbGradPop)" filter="url(#softShadowPop)" />
        <circle cx="50" cy="50" r="46" fill="url(#glossGradPop)" />
        <circle cx="50" cy="50" r="26" fill="#FFFFFF" />
        <path d="M50 32V50" stroke="url(#orbGradPop)" stroke-width="6" stroke-linecap="round"/>
        <path d="M50 50L65 50" stroke="url(#orbGradPop)" stroke-width="6" stroke-linecap="round"/>
      </svg>
      <span class="title">Flow Tracker</span>
    </div>
    <div class="status">Tracking active tab in background</div>
    <button id="open-dashboard" class="btn-primary">Open Dashboard</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
